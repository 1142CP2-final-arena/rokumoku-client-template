name: Sandbox Pull-Only CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-publish-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Syntax Check
        run: |
          python -m py_compile api.py
          python -m py_compile main.py
          python -m py_compile strategy.py

      - name: Emit Sandbox Build Metadata
        run: |
          mkdir -p .arena
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          COMMIT_HASH="${GITHUB_SHA}"
          cat > .arena/sandbox-build-metadata.json <<EOF
          {
            "build_datetime": "${BUILD_TIME}",
            "commit_hash": "${COMMIT_HASH}",
            "entrypoint": "main.py"
          }
          EOF

      - name: Upload Build Metadata Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-build-metadata
          path: .arena/sandbox-build-metadata.json
